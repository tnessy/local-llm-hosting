# llama-swap config — maps a model NAME to the command that starts its backend.
# When a request for "coder" arrives, llama-swap runs the matching TabbyAPI
# process (loading the EXL2 weights into VRAM), routes the request, and later
# unloads it so a different model can take the GPU. See step 05.
#
# Placeholders <...> are finalized in step 10 once the GPU/models are chosen.

# Seconds an idle backend stays loaded before llama-swap unloads it (frees VRAM).
ttl: 1800

models:
  # ── Coding model (function calling / large context) ───────────────────────
  "coder":
    # TabbyAPI launches on its default port; llama-swap proxies to it.
    cmd: >
      python3 /app/tabbyAPI/main.py
      --model-dir /models
      --model-name <Qwen3-Coder-30B-exl2>
      --max-seq-len 65536
      --api-key ${env.TABBY_API_KEY}
      --host 127.0.0.1 --port 5001
    proxy: "http://127.0.0.1:5001"
    # Health endpoint llama-swap polls to know the backend is ready.
    checkEndpoint: "/health"

  # ── General chat model ────────────────────────────────────────────────────
  "chat":
    cmd: >
      python3 /app/tabbyAPI/main.py
      --model-dir /models
      --model-name <general-chat-exl2>
      --max-seq-len 32768
      --api-key ${env.TABBY_API_KEY}
      --host 127.0.0.1 --port 5002
    proxy: "http://127.0.0.1:5002"
    checkEndpoint: "/health"

# Notes:
# - Only one model is resident at a time by default (single GPU). To keep two
#   loaded simultaneously (if VRAM allows), use a llama-swap "group". See step 05.
# - First request to a cold model incurs a 5–30s load; subsequent requests are
#   full speed until the model is swapped or times out (ttl).
