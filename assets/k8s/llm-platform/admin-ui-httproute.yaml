# HTTPRoute for admin.<domain> -> the Admin UI, attached to core-gateway's
# `admin` listener (already restricted to routes from llm-platform only — see
# core-gateway.yaml). Apply once admin-ui.yaml is deployed. Replace domain.com
# with your domain.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admin-ui-route
  namespace: llm-platform
spec:
  parentRefs:
  - name: core-gateway
    namespace: llm-platform
    sectionName: admin
  hostnames: ["admin.domain.com"]
  rules:
  - backendRefs:
    - name: admin-ui
      port: 8080
