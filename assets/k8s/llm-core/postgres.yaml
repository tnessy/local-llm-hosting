# PostgreSQL backing store for LiteLLM. Modern LiteLLM requires PostgreSQL for its
# database features (virtual keys, budgets, spend tracking) — SQLite is no longer
# supported. Reachable only from the litellm pod (NetworkPolicy). Password comes
# from the litellm-postgres-credentials Secret (step 04 §3).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-postgres-data
  namespace: llm-core
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-postgres
  namespace: llm-core
  labels:
    app: litellm-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate            # single writer — never two pods on one PVC
  selector:
    matchLabels:
      app: litellm-postgres
  template:
    metadata:
      labels:
        app: litellm-postgres
    spec:
      securityContext:
        fsGroup: 999          # postgres group in the official image
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres
        image: postgres:16-alpine   # pin to digest — step 04 §6
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: litellm
        - name: POSTGRES_USER
          value: litellm
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: litellm-postgres-credentials
              key: password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata   # subdir so lost+found doesn't block init
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: litellm-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-postgres
  namespace: llm-core
spec:
  selector:
    app: litellm-postgres
  ports:
  - port: 5432
    targetPort: 5432
