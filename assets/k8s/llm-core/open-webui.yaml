# Web UI for non-technical friends and the application-layer auth boundary
# (accounts + signup disabled). Sits behind Cloudflare Access (step 08).
# Talks to LiteLLM with its own virtual key from the openwebui-credentials Secret.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: llm-core
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 5Gi                    # accounts, per-user keys, chat history — BACK THIS UP (step 14)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: llm-core
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      securityContext:
        fsGroup: 1000                 # PVC writable by the container user
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main   # pin to digest — step 04 §6
        ports:
        - containerPort: 8080
        env:
        - name: OPENAI_API_BASE_URL
          value: http://litellm.llm-core:4000/v1
        - name: OPENAI_API_KEY        # a LiteLLM virtual key minted for the UI (step 06)
          valueFrom:
            secretKeyRef:
              name: openwebui-credentials
              key: litellm-key
        - name: WEBUI_SECRET_KEY      # session signing secret — keeps logins valid across restarts
          valueFrom:
            secretKeyRef:
              name: openwebui-credentials
              key: secret-key
        - name: WEBUI_AUTH
          value: "true"
        - name: ENABLE_SIGNUP
          value: "false"              # accounts are created manually (step 07)
        - name: WEBUI_NAME
          value: Home LLM
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openwebui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: llm-core
spec:
  selector:
    app: open-webui
  ports:
  - port: 8080
    targetPort: 8080
