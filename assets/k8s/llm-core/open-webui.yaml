# Web UI for non-technical friends and the application-layer auth boundary
# (accounts + signup disabled). Sits behind Cloudflare Access (step 08).
# Talks to LiteLLM with its own virtual key from the openwebui-credentials Secret.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: llm-core
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 5Gi                    # accounts, per-user keys, chat history — BACK THIS UP (step 14)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: llm-core
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      securityContext:
        fsGroup: 1000                 # PVC writable by the container user
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main   # pin to digest — step 04 §6
        ports:
        - containerPort: 8080
        env:
        - name: OPENAI_API_BASE_URL
          value: http://litellm.llm-core:4000/v1
        - name: OPENAI_API_KEY        # a LiteLLM virtual key minted for the UI (step 06)
          valueFrom:
            secretKeyRef:
              name: openwebui-credentials
              key: litellm-key
        - name: WEBUI_SECRET_KEY      # session signing secret — keeps logins valid across restarts
          valueFrom:
            secretKeyRef:
              name: openwebui-credentials
              key: secret-key
        - name: WEBUI_AUTH
          value: "true"
        - name: WEBUI_AUTH_TRUSTED_EMAIL_HEADER
          value: Cf-Access-Authenticated-User-Email
                                      # SSO behind Cloudflare Access (step 14 §8): CF injects
                                      # this header after Authentik+MFA; Open WebUI auto-signs-in
                                      # the matching user instead of showing its own login form.
                                      # Safe ONLY because the sole ingress path is
                                      # cloudflared → traefik → open-webui (NetworkPolicies), and
                                      # CF Access strips any client-supplied Cf-Access-* header at
                                      # the edge — so the header cannot be spoofed from outside.
        - name: ENABLE_SIGNUP
          value: "false"              # accounts are created manually (step 07)
        - name: ENABLE_PERSISTENT_CONFIG
          value: "true"               # admin-panel settings (tool server connections,
                                      # OpenAI connection edits, anything set through the
                                      # UI) need to survive pod restarts — with this false,
                                      # they live only in process memory and are silently
                                      # wiped on every restart (step 17 hit this directly).
                                      # Tradeoff: Open WebUI first boots in step 04, before
                                      # the litellm-key exists (minted in step 06) — that
                                      # first boot seeds an empty OpenAI connection into the
                                      # DB, and seed_defaults only inserts a key if it's not
                                      # already there, so the real key from step 06 would be
                                      # silently ignored otherwise. Step 07 §2 has the
                                      # required one-time fix (confirm/resave the Connection
                                      # in Admin Settings after step 06's restart) — a normal
                                      # admin-UI save always overwrites the stale value.
        - name: WEBUI_NAME
          value: Home LLM
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openwebui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: llm-core
spec:
  selector:
    app: open-webui
  ports:
  - port: 8080
    targetPort: 8080
