# API gateway: per-user virtual keys, budgets, dialect translation.
# The auth + isolation boundary between all clients and the inference engine.
# Credentials come from the litellm-credentials, tabby-credentials,
# litellm-postgres-credentials, and litellm-sso-credentials (step 17) Secrets via
# secretKeyRef — never inline value: fields, which are readable from the pod spec
# by anything with pods:get.
# State lives in PostgreSQL (postgres.yaml), which LiteLLM requires for virtual
# keys / budgets / spend — SQLite is no longer supported.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: llm-core
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      # The litellm-database image bundles the Prisma CLI + engines in /root/.cache
      # (so DB migrations run offline, without a runtime Node/npm download), which
      # means it runs as root. It stays hardened via cap-drop + no-privilege-
      # escalation + seccomp + NetworkPolicy isolation.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm-database:main-stable   # pin to digest — step 04 §6
        args: ["--config", "/app/config.yaml", "--port", "4000"]
        ports:
        - containerPort: 4000
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-credentials
              key: master-key
        - name: LITELLM_SALT_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-credentials
              key: salt-key
        - name: TABBY_API_KEY         # litellm authenticates to TabbyAPI as this key
          valueFrom:
            secretKeyRef:
              name: tabby-credentials
              key: api-key
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: litellm-postgres-credentials
              key: password
        # k8s expands $(POSTGRES_PASSWORD) from the env var above, so the password
        # never appears as a literal in the manifest or pod spec.
        - name: DATABASE_URL
          value: "postgresql://litellm:$(POSTGRES_PASSWORD)@litellm-postgres:5432/litellm"
        # Prisma reads its bundled engines from $HOME/.cache — point HOME at /root
        # where the litellm-database image pre-caches them.
        - name: HOME
          value: /root
        # LiteLLM's own Admin UI SSO (step 17) — a second, app-layer gate behind
        # Cloudflare Access on llm-admin.domain.com, using a dedicated Authentik
        # OAuth2Provider/Application ("litellm-ui", not the "admin-ui" one — each
        # OIDC-consuming service gets its own client ID/secret, per 14-identity-sso.md).
        # Redirect URI LiteLLM expects: https://<PROXY_BASE_URL>/sso/callback.
        - name: PROXY_BASE_URL
          value: "https://llm-admin.domain.com"
        - name: GENERIC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: litellm-sso-credentials
              key: client-id
        - name: GENERIC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: litellm-sso-credentials
              key: client-secret
        # Read these three off https://auth.domain.com/application/o/litellm-ui/.well-known/openid-configuration
        # once the Authentik application exists — don't hand-guess them.
        - name: GENERIC_AUTHORIZATION_ENDPOINT
          value: "https://auth.domain.com/application/o/authorize/"
        - name: GENERIC_TOKEN_ENDPOINT
          value: "https://auth.domain.com/application/o/token/"
        - name: GENERIC_USERINFO_ENDPOINT
          value: "https://auth.domain.com/application/o/userinfo/"
        # Second-pass only: log in once via SSO, copy the resulting user_id from the
        # LiteLLM UI, then set this and redeploy. Promotes exactly one user to Proxy
        # Admin — verify whether additional admins need manual role promotion
        # (17-mcp-registry.md §Verification).
        # - name: PROXY_ADMIN_ID
        #   value: "<paste-after-first-sso-login>"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: litellm-config.yaml
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: llm-core
spec:
  selector:
    app: litellm
  ports:
  - port: 4000
    targetPort: 4000
