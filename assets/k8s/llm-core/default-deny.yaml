# Default-deny baseline for llm-core. Apply BEFORE the explicit allow policies in
# networkpolicies.yaml. With no default-deny, any pod added to the namespace — a
# debug container, a mis-injected sidecar, a future service — inherits
# unrestricted ingress and egress. The allow policies layer on top of this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: llm-core
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
