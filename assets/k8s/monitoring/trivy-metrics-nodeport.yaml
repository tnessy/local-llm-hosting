# NodePort exposing Trivy Operator's Prometheus metrics (:8080) as :32001, so the
# Prometheus on the external monitoring host can scrape it. Applied in step 13 §3
# after `microk8s helm3 install trivy-operator`.
# NOTE: 32001, NOT 32000 — the MicroK8s registry addon already owns NodePort 32000
# (localhost:32000), and two NodePort services can't share a port.
apiVersion: v1
kind: Service
metadata:
  name: trivy-metrics-nodeport
  namespace: trivy-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: trivy-operator
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 32001
