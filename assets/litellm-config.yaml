# LiteLLM gateway config. LiteLLM is the single API front door:
#   - issues per-friend virtual keys with budgets / rate limits (step 06)
#   - translates dialects so Codex (Responses) and Claude Code (Anthropic) work
#   - routes every model to the llama-swap endpoint (service "inference")
#
# Clients call LiteLLM; LiteLLM calls http://inference:8080/v1 (llama-swap),
# which loads the right EXL3 model on the GPU on demand.

model_list:
  - model_name: coder              # what clients request
    litellm_params:
      model: openai/coder          # "openai/<name>" => OpenAI-compatible upstream
      api_base: http://inference:8080/v1
      api_key: os.environ/TABBY_API_KEY
      # TabbyAPI only emits the `usage` object (token counts) when the request
      # carries stream_options.include_usage — and it applies that gate to
      # NON-streaming calls too (non-standard). There is no server/CLI option, so
      # we inject it here via extra_body (passed raw upstream, unaffected by
      # drop_params) on every request, so LiteLLM's spend/budget metering sees
      # real token counts for local models. See step 05.
      extra_body:
        stream_options:
          include_usage: true
  - model_name: chat
    litellm_params:
      model: openai/chat
      api_base: http://inference:8080/v1
      api_key: os.environ/TABBY_API_KEY
      extra_body:
        stream_options:
          include_usage: true

litellm_settings:
  drop_params: true                # tolerate client params the backend ignores
  # set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # admin key for /key/generate (step 06)
  database_url: os.environ/DATABASE_URL       # PostgreSQL (postgres.yaml); stores virtual keys + spend

# Dialect endpoints exposed by LiteLLM (used in step 12):
#   OpenAI Chat Completions : POST {api.domain.com}/v1/chat/completions
#   OpenAI Responses (Codex): POST {api.domain.com}/v1/responses
#   Anthropic (Claude Code) : POST {api.domain.com}/v1/messages
#
# Per-friend keys are created at runtime, not here (step 06), e.g.:
#   curl -s api.domain.com/key/generate -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
#     -d '{"models":["coder","chat"],"max_budget":20,"rpm_limit":60,"key_alias":"alice"}'
